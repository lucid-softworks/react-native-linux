name: release-please

# release-please watches main for Conventional Commits and opens / updates
# a release PR. Merging the release PR creates GitHub Releases and tags
# for any bumped packages, then this workflow publishes them to npm with
# provenance.
#
# Required repo secret: NPM_TOKEN — an automation token from the
# Lucid Softworks npm org with publish rights on @lucid-softworks/*.

on:
  push:
    branches: [main]

# Serialise release-please runs on main so a quick follow-up push can't
# race the first one and produce two release PRs (the action is
# self-aware, but the publish step that follows isn't).
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write # required for npm provenance attestations

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.5'

jobs:
  release-please:
    runs-on: ubuntu-24.04
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r run build

      - name: Publish bumped packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # paths_released is a JSON array of workspace dirs that just got
          # a new tag. Publish only those, with provenance.
          paths='${{ needs.release-please.outputs.paths_released }}'
          echo "Releasing paths: $paths"
          for dir in $(printf '%s' "$paths" | python3 -c "import json,sys; print(' '.join(json.load(sys.stdin)))"); do
            echo "▸ Publishing $dir"
            pnpm --filter "./$dir" publish --access public --provenance --no-git-checks
          done
