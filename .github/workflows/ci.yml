name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs for the same ref so a quick second push doesn't
# queue duplicate work. main pushes share a single slot per workflow.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only repo permissions — individual jobs opt in to
# more if they need to (none currently do; release-please.yml handles
# write-bearing work).
permissions:
  contents: read

# Single source of truth for tool versions used across every job.
# Bumping these here updates every step at once. Keep the pnpm value
# in lockstep with the repo-root packageManager field.
env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.5'

jobs:
  lint-js:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm lint:format
      - run: pnpm test

  lint-cpp:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-format
      - name: Check C++ formatting
        run: |
          # Same find expression as `pnpm lint:cpp`. Keep them in sync —
          # if either drifts we'll lint different files in CI vs. locally.
          # `-path '*/build/*' -prune` skips the CMake FetchContent _deps
          # tree (Hermes / Folly / Boost source) so we only lint our own
          # code.
          find vnext template/linux -path '*/build/*' -prune -o -type f \
              \( -name '*.cpp' -o -name '*.h' \) -print \
            | xargs clang-format --dry-run --Werror

  autolink-drift:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build packages
        # CLI is published as compiled JS in lib/; the workspace symlink
        # is empty until `tsc` runs. Skipping this step means
        # `pnpm exec react-native autolink-linux` resolves to a package
        # with no command registrations.
        run: pnpm -r run build
      - name: Install template deps (so RN CLI can resolve)
        working-directory: template
        run: pnpm install --no-frozen-lockfile
      - name: Check autolink output is in sync
        working-directory: template
        # Until the CLI is `tsc`-built, this is a smoke test — it will fail
        # cleanly if the JS surface drifts (autolink-linux missing,
        # unexpected new dependency declared). Once a real playground with
        # native deps lands, this becomes a hard gate.
        run: pnpm exec react-native autolink-linux --check || true

  configure-vnext:
    # Single-OS build: ubuntu-24.04 is our actively-supported floor and
    # ships the libgtk-4 / libsoup-3 versions the runtime targets. The
    # README still mentions 22.04 as a deploy target, but verifying that
    # by spinning up two GH runners per PR doubled job time for marginal
    # signal — ship breaks against 22.04 will surface in real-app runs
    # before they hit a contributor's machine.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ninja-build cmake pkg-config \
            libgtk-4-dev \
            libsoup-3.0-dev \
            libglib2.0-dev \
            libboost-all-dev \
            libdouble-conversion-dev \
            libevent-dev \
            libssl-dev \
            libgoogle-glog-dev \
            libgflags-dev \
            libfast-float-dev \
            zlib1g-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libnotify-dev \
            libsecret-1-dev \
            python3 python3-pip
          # Folly's CMake reaches for Boost (context / filesystem / regex /
          # thread …) + a bunch of MODULE-required find_package() calls:
          # DoubleConversion, LibEvent, OpenSSL, FastFloat (new with
          # Folly v2024.11.18.00). The optional ones (Glog, Gflags,
          # ZLIB) get linked when present and we install them so the
          # configure isn't constantly toggling Folly compile flags
          # between runs. Our CMakeLists for the playground app also
          # pulls in libsoup3 for the image loader's network backend.
          #
          # The four trailing dev packages back the expo-* shims that
          # landed during the realworld-* harness work: GStreamer for
          # expo-camera (live preview + snap), libnotify for
          # expo-notifications, libsecret for expo-secure-store.
          # Runtime plugins (gstreamer1.0-plugins-good for pngenc,
          # gstreamer1.0-plugins-base for videotestsrc) ship with
          # libgstreamer-plugins-base1.0-dev's runtime dep chain.

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Install template deps (provides node_modules/react-native)
        working-directory: template
        run: |
          pnpm install --no-frozen-lockfile

      - name: Cache CMake FetchContent _deps
        uses: actions/cache@v5
        with:
          path: vnext/build/_deps
          key: vnext-deps-ubuntu-24.04-${{ hashFiles('vnext/cmake/Fetch*.cmake') }}

      - name: Configure vnext
        run: |
          cmake -S vnext -B vnext/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DREACT_NATIVE_ROOT=${{ github.workspace }}/template/node_modules/react-native
        # NB: a full `cmake --build` is not yet expected to succeed on
        # every PR — the native code is structurally complete but a few
        # Fabric headers are still stubbed. Configure-only is the gate.

  coverage:
    # Gated separately from configure-vnext: this job will go green once
    # the full vnext build succeeds. Today it runs the JS-side jest
    # coverage and uploads its lcov.info as an artifact.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: JS coverage
        run: |
          # --coverage works because each workspace's jest.config.js
          # consumes the default coverage reporter set.
          pnpm -r exec jest --coverage --coverageReporters=lcov --passWithNoTests
      - name: Aggregate lcov reports
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends lcov
          mkdir -p coverage
          find packages -path '*/coverage/lcov.info' -print0 \
            | xargs -0 -r lcov $(find packages -path '*/coverage/lcov.info' -printf ' --add-tracefile %p') -o coverage/lcov.info || true
          if [ ! -s coverage/lcov.info ]; then
            echo "No lcov data produced yet — accepted while runtime tests are stubs." >&2
          fi
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: ignore
