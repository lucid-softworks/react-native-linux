name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs for the same ref so a quick second push doesn't
# queue duplicate work. main pushes share a single slot per workflow.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only repo permissions — individual jobs opt in to
# more if they need to (none currently do; release-please.yml handles
# write-bearing work).
permissions:
  contents: read

# Single source of truth for tool versions used across every job.
# Bumping these here updates every step at once. Keep the pnpm value
# in lockstep with the repo-root packageManager field.
env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.5'

jobs:
  lint-js:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm lint:format
      - run: pnpm test

  lint-cpp:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-format
      - name: Check C++ formatting
        run: |
          # Same find expression as `pnpm lint:cpp`. Keep them in sync —
          # if either drifts we'll lint different files in CI vs. locally.
          find vnext template/linux -name '*.cpp' -o -name '*.h' \
            | xargs clang-format --dry-run --Werror

  autolink-drift:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install template deps (so RN CLI can resolve)
        working-directory: template
        run: pnpm install --no-frozen-lockfile
      - name: Check autolink output is in sync
        working-directory: template
        # Until the CLI is `tsc`-built, this is a smoke test — it will fail
        # cleanly if the JS surface drifts (autolink-linux missing,
        # unexpected new dependency declared). Once a real playground with
        # native deps lands, this becomes a hard gate.
        run: pnpm exec react-native autolink-linux --check || true

  configure-vnext:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ninja-build cmake pkg-config \
            libgtk-4-dev \
            libglib2.0-dev \
            python3 python3-pip

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Install template deps (provides node_modules/react-native)
        working-directory: template
        run: |
          pnpm install --no-frozen-lockfile

      - name: Cache CMake FetchContent _deps
        uses: actions/cache@v4
        with:
          path: vnext/build/_deps
          key: vnext-deps-${{ matrix.os }}-${{ hashFiles('vnext/cmake/Fetch*.cmake') }}

      - name: Configure vnext
        run: |
          cmake -S vnext -B vnext/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DREACT_NATIVE_ROOT=${{ github.workspace }}/template/node_modules/react-native
        # NB: a full `cmake --build` is not yet expected to succeed on
        # every PR — the native code is structurally complete but a few
        # Fabric headers are still stubbed. Configure-only is the gate.

  coverage:
    # Gated separately from configure-vnext: this job will go green once
    # the full vnext build succeeds. Today it runs the JS-side jest
    # coverage and uploads its lcov.info as an artifact.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: JS coverage
        run: |
          # --coverage works because each workspace's jest.config.js
          # consumes the default coverage reporter set.
          pnpm -r exec jest --coverage --coverageReporters=lcov --passWithNoTests
      - name: Aggregate lcov reports
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends lcov
          mkdir -p coverage
          find packages -path '*/coverage/lcov.info' -print0 \
            | xargs -0 -r lcov $(find packages -path '*/coverage/lcov.info' -printf ' --add-tracefile %p') -o coverage/lcov.info || true
          if [ ! -s coverage/lcov.info ]; then
            echo "No lcov data produced yet — accepted while runtime tests are stubs." >&2
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: ignore
